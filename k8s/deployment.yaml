apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-code-review-assistant
  labels:
    app: ai-code-review
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-code-review
  template:
    metadata:
      labels:
        app: ai-code-review
    spec:
      containers:
      - name: ai-code-review
        image: your-docker-registry/ai-code-review-assistant:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: ai-code-review-secrets
        resources:
          limits:
            cpu: "1"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: firebase-secret
          mountPath: /etc/secrets
          readOnly: true
      volumes:
      - name: firebase-secret
        secret:
          secretName: firebase-service-account
